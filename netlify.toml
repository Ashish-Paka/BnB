[build]
  command = "npm run build"
  publish = "dist"

[dev]
  framework = "#custom"
  command = "vite --port=3000 --host=0.0.0.0"
  targetPort = 3000
  port = 8888

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# Redirects handled by public/_redirects file for reliability
